# Mirror experiment — treatment tables and page view specs
#
# Experiment: does making a StatCan table's values crawlable (static HTML +
# schema.org/Dataset markup, hosted on GitHub Pages) cause search/answer
# engines to cite StatCan data — or cite it *fresher* — on the matched queries?
# Design and pre-registration: docs/mirror_experiment.md
#
# Candidate pool = the 9 tables behind the pilot's "answerable but invisible"
# cells (7 never-cited from the DDG 2x2 gap; 2 observed stale-cited from the
# Bing/Duck.ai rounds). Assignment is cluster-randomized at the TABLE level
# (queries sharing a table move together), stratified by flavour, with
# random.Random(20260718): sample(never_cited, 4) + sample(stale_cited, 1).
# Only treatment tables get mirror pages. Control tables MUST NOT be mirrored
# or linked until the experiment concludes.

experiment:
  seed: 20260718
  assigned: "2026-07-18"
  baseline_audits:
    - visibility/results/ddg_2026-07-18.csv
    - visibility/results/bing_ai_sample_2026-07-18.csv
    - visibility/results/duckai_sample_2026-07-18.csv
  treatment:
    never_cited: ["11100130", "14100064", "45100039", "45100104"]
    stale_cited: ["33101045"]
  control:
    never_cited: ["14100288", "45100073", "98100353"]
    stale_cited: ["45100048"]
  treatment_queries: [SOC-004, LAB-002, LAB-003, SOC-001, SOC-002, SOC-024, DIG-014]
  control_queries: [LAB-014, SOC-010, SOC-016, SOC-005]

# View spec fields:
#   fixed  — {DimensionName: exact member name} held constant
#   rows   — "time" (periods as rows) or {dim, members: [names] | "all"}
#   cols   — "time" or {dim, members: [names]}
#   latestN — periods to request (rows/cols "time" render them; otherwise
#             only the latest period is shown)
#   caption — hand-written, number-free context line under the table title
# headline — one sentence rendered above the tables, with {value}/{period}
#            filled from the fetched cell so prose can never drift from data.

tables:
  "11100130":
    slug: charitable-donors-canada
    queries: [SOC-004]
    flavour: never_cited
    page_title: "Charitable donors and donations in Canada, 1997 to 2023"
    headline:
      view: trend
      row_period: latest
      col: "Median donations"
      template: "In {period}, the median charitable donation claimed by Canadian tax filers was ${value}."
    views:
      - id: trend
        title: "Charitable giving in Canada over time"
        caption: "Annual counts of donors and donation amounts reported by tax filers, Canada. The long series shows whether charitable giving is rising or declining."
        fixed: {Geography: "Canada"}
        rows: time
        latestN: 15
        cols:
          dim: "Donors and donations"
          members: ["Number of donors", "Total charitable donations", "Median donations", "Average age of donors"]
      - id: by-province
        title: "Charitable donors by province, latest year"
        caption: "Donors, median donation, and total donations by province and territory."
        rows:
          dim: Geography
          members: ["Canada", "Newfoundland and Labrador", "Prince Edward Island", "Nova Scotia", "New Brunswick", "Quebec", "Ontario", "Manitoba", "Saskatchewan", "Alberta", "British Columbia", "Yukon", "Northwest Territories", "Nunavut"]
        cols:
          dim: "Donors and donations"
          members: ["Number of donors", "Median donations", "Total charitable donations"]
        latestN: 1

  "14100064":
    slug: average-salary-canada
    queries: [LAB-002, LAB-003]
    flavour: never_cited
    page_title: "Average and median wages in Canada, by province and by age group"
    headline:
      view: by-province
      row: "Canada"
      col: "Average hourly wage rate"
      template: "In {period}, the average hourly wage of Canadian employees was ${value}."
    views:
      - id: by-province
        title: "Average and median wages by province"
        caption: "Hourly and weekly wage rates for all employees (full- and part-time, all industries, all ages), by province, latest year. Labour Force Survey."
        fixed:
          "Type of work": "Both full- and part-time employees"
          "North American Industry Classification System (NAICS)": "Total employees, all industries"
          "Gender": "Total - Gender"
          "Age group": "15 years and over"
        rows: {dim: Geography, members: all}
        cols:
          dim: Wages
          members: ["Average hourly wage rate", "Average weekly wage rate", "Median hourly wage rate", "Median weekly wage rate"]
        latestN: 1
      - id: by-age
        title: "Average and median wages by age group"
        caption: "Wage rates by employee age group, Canada, all industries, latest year."
        fixed:
          Geography: "Canada"
          "Type of work": "Both full- and part-time employees"
          "North American Industry Classification System (NAICS)": "Total employees, all industries"
          "Gender": "Total - Gender"
        rows: {dim: "Age group", members: all}
        cols:
          dim: Wages
          members: ["Average hourly wage rate", "Average weekly wage rate", "Median hourly wage rate", "Median weekly wage rate"]
        latestN: 1
      - id: trend
        title: "Average hourly wage in Canada over time"
        fixed:
          Geography: "Canada"
          "Type of work": "Both full- and part-time employees"
          "North American Industry Classification System (NAICS)": "Total employees, all industries"
          "Gender": "Total - Gender"
          "Age group": "15 years and over"
        rows: time
        latestN: 10
        cols:
          dim: Wages
          members: ["Average hourly wage rate", "Median hourly wage rate"]

  "45100039":
    slug: volunteering-canada
    queries: [SOC-001, SOC-002]
    flavour: never_cited
    page_title: "Volunteer rate and volunteer hours in Canada"
    headline:
      view: by-age
      row: "Total, all ages"
      col: "Volunteer rate"
      template: "In {period}, {value}% of Canadians aged 15 and over did formal volunteer work through a group or organization."
    views:
      - id: by-age
        title: "Formal volunteering by age group"
        caption: "Volunteer rate and annual volunteer hours (formal volunteering through groups or organizations), Canada, by age group."
        fixed:
          Geography: "Canada"
          "Definition of volunteering": "Definition of formal volunteering"
        rows: {dim: Age, members: all}
        cols:
          dim: "Volunteer statistics"
          members: ["Volunteer rate", "Average annual volunteer hours", "Median annual volunteer hours"]
        latestN: 1
      - id: by-province
        title: "Formal volunteer rate by province"
        fixed:
          "Definition of volunteering": "Definition of formal volunteering"
          Age: "Total, all ages"
        rows: {dim: Geography, members: all}
        cols:
          dim: "Volunteer statistics"
          members: ["Volunteer rate", "Average annual volunteer hours"]
        latestN: 1

  "45100104":
    slug: time-use-canada
    queries: [SOC-024]
    flavour: never_cited
    page_title: "How Canadians spend their time: daily hours by activity and gender"
    headline:
      view: by-gender
      row: "Unpaid household work (household or family)"
      col: "Women+"
      template: "In {period}, women in Canada spent a daily average of {value} hours on unpaid household work."
    views:
      - id: by-gender
        title: "Daily average time on each activity, by gender"
        caption: "Daily average hours spent on each activity group (whole population aged 15+, participants and non-participants), Canada, by gender. Time Use Survey."
        fixed:
          Geography: "Canada"
          "Age group": "Total, 15 years and over"
          Statistics: "Daily average time, population"
        rows: {dim: "Activity group", members: all}
        cols: {dim: Gender, members: ["Total, all persons", "Men+", "Women+"]}
        latestN: 1
      - id: participation
        title: "Participation rate in each activity, by gender"
        caption: "Share of persons aged 15+ who did each activity on an average day, by gender."
        fixed:
          Geography: "Canada"
          "Age group": "Total, 15 years and over"
          Statistics: "Participation rate"
        rows: {dim: "Activity group", members: all}
        cols: {dim: Gender, members: ["Total, all persons", "Men+", "Women+"]}
        latestN: 1

  "33101045":
    slug: ai-use-businesses-canada
    queries: [DIG-014]
    flavour: stale_cited
    page_title: "Use of artificial intelligence by businesses in Canada"
    headline:
      view: plans
      row: "Yes, business plans to use artificial intelligence (AI) for producing goods or delivering services"
      col: value
      template: "In the {period} survey, {value}% of Canadian businesses planned to use artificial intelligence in producing goods or delivering services over the next 12 months."
    views:
      - id: plans
        title: "Businesses planning to use AI, and application types"
        caption: "Percentage of businesses and organizations planning to use AI over the next 12 months, and the types of AI applications planned, Canada, all industries. Canadian Survey on Business Conditions."
        fixed:
          Geography: "Canada"
          "Business characteristics": "North American Industry Classification System (NAICS), all industries"
        rows: {dim: "Use of artificial intelligence (AI) by businesses or organizations in producing goods or delivering services over the next 12 months", members: all}
        cols: value
        latestN: 1
      - id: by-industry
        title: "Businesses planning to use AI, by industry"
        fixed:
          Geography: "Canada"
          "Use of artificial intelligence (AI) by businesses or organizations in producing goods or delivering services over the next 12 months": "Yes, business plans to use artificial intelligence (AI) for producing goods or delivering services"
        rows:
          dim: "Business characteristics"
          members: ["North American Industry Classification System (NAICS), all industries", "Agriculture, forestry, fishing and hunting", "Mining, quarrying, and oil and gas extraction", "Construction", "Manufacturing", "Wholesale trade", "Retail trade", "Transportation and warehousing", "Information and cultural industries", "Finance and insurance", "Real estate and rental and leasing", "Professional, scientific and technical services", "Administrative and support, waste management and remediation services", "Health care and social assistance", "Arts, entertainment and recreation", "Accommodation and food services", "Other services (except public administration)"]
        cols: value
        latestN: 1
