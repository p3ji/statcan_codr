# ABS AI/Search Visibility Study — Australia mirror query bank
#
# Purpose: a 1:1 Australian localization of visibility/queries.yaml (the Canada /
# StatCan bank), so the visibility of Australian Bureau of Statistics (ABS) data
# through chatbots and search can be compared apples-to-apples against Statistics
# Canada. IDs match the Canada bank (LAB-001 here mirrors LAB-001 there); the
# `query` text is localized (ABS, states/territories, Sydney/Melbourne, Australian
# institution owners) but the intent, source (autocomplete vs curated) and probe
# tags are kept identical to preserve comparability.
#
# ANSWERABILITY CODING CAVEAT: unlike the Canada bank — coded against a fetched
# WDS cube list (getAllCubesListLite, 8,212 cubes) — this AU coding is pilot-grade
# from ABS-catalogue knowledge, NOT a fetched ABS catalogue. `candidate_ref` gives
# the ABS collection / catalogue number or the non-ABS owner. Re-verify against
# the live ABS catalogue (abs.gov.au) before publishing. Codes:
#   fully          — current published ABS release at the needed granularity
#   partially      — ABS indicator exists but stale, discontinued, wrong
#                    granularity, or split across sources
#   microdata_only — ABS collects it but publishes only in analysis / TableBuilder
#                    microdata, no standing release
#   not_collected  — not an ABS product; another org owns it (Fair Work Commission,
#                    Home Affairs, ACMA, ACCC, eSafety, WGEA, academic panels…)
#
# Key structural differences from Canada worth watching in the results:
#   - ABS is STRONGER on demography: Marriages & Divorces is current (Canada's
#     stalled at 2020); a dedicated Characteristics of Recent Migrants labour
#     survey and Personal Income of Migrants exist; ERP is quarterly.
#   - ABS is WEAKER on society/community: loneliness, life satisfaction, trust and
#     social cohesion are largely owned by academic/NGO panels (HILDA, Scanlon
#     Foundation, Ending Loneliness Together) rather than a flagship ABS survey
#     like Canada's Canadian Social Survey.
#   - Digital economy is a collapse zone in BOTH: ABS discontinued Household Use
#     of Information Technology (8146.0) after 2016-17; ACMA/eSafety/commercial
#     now own most of the answer space.

